<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#b35f3c" />
    <meta name="description" content="Oefen voor het Klimvaardigheidsbewijs (KVB 1, 2, 2+ en 3) met quizzen en flashcards." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>KVB Studie</title>
    <script>
      // Pas het thema toe voor de eerste paint (geen flits).
      try {
        var t = localStorage.getItem('kvb-theme');
        if (t !== 'dark' && t !== 'light')
          t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
